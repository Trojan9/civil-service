name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cinema-tickets-javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cinema-tickets-javascript/package-lock.json
      - run: npm ci
      - run: npm run lint

  format:
    name: Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cinema-tickets-javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cinema-tickets-javascript/package-lock.json
      - run: npm ci
      - run: npm run format:check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cinema-tickets-javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cinema-tickets-javascript/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, format]
    defaults:
      run:
        working-directory: cinema-tickets-javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cinema-tickets-javascript/package-lock.json
      - run: npm ci
      - run: npm test
